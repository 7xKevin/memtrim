<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MemTrim Lite Developers</title>
  <meta name="description" content="Developers behind MemTrim Lite.">
  <link rel="icon" href="/logo-mark.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles.css">
</head>
<body data-page="developers">
  <div class="site-shell">
    <header class="site-header">
      <div class="brand">
        <img src="/logo-mark.svg" alt="MemTrim Lite logo" class="brand-mark">
        <div>
          <h1 data-site-name>MemTrim Lite</h1>
          <p>Developers</p>
        </div>
      </div>
      <nav class="header-nav">
        <a href="/">Home</a>

        <a href="/support">Support</a>
        <button class="theme-toggle" type="button" data-theme-toggle>Dark theme</button>
      </nav>
    </header>

    <main>
      <section class="panel">
        <h3 id="developers-title">Development Team</h3>
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Role</th>
            </tr>
          </thead>
          <tbody id="developers-table-body"></tbody>
        </table>
      </section>
    </main>

    <footer class="site-footer">
      <span data-site-name>MemTrim Lite</span>
      <span><a href="/privacy">Privacy</a> | <a href="/support">Support</a></span>

  <script src="/theme.js"></script>
