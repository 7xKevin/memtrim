services:
  - type: web
    runtime: static
    name: memtrim-lite-site
    branch: main
    buildCommand: npm install && npm run build:site
    staticPublishPath: ./website
    pullRequestPreviewsEnabled: true
    envVars:
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /developers
        destination: /developers.html
      - type: rewrite
        source: /changelog
        destination: /changelog.html
      - type: rewrite
        source: /privacy
        destination: /privacy.html
      - type: rewrite
        source: /support
        destination: /support.html
