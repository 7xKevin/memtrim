services:
  - type: web
    runtime: static
    name: memtrim-lite-site
    branch: main
    staticPublishPath: ./website
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /developers
        destination: /developers.html
